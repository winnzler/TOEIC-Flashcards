  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

display: swap;\n  src: url(\"3f488802-26df-4694-a934-73f963ce31c3\") format('woff2');\n  unicode-range: U+02D7, U+0303, U+0331, U+0E01-0E5B, U+200C-200D, U+25CC;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Noto Sans Thai';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"7b9649e7-19c1-413d-96cd-5d3ac0e32c51\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Noto Sans Thai';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"47af6cff-003e-4480-bc40-f5b4df28d1be\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"60eaf4da-3e00-4c99-8ed6-b79815606802\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }\n  html, body { margin: 0; padding: 0; }\n  body { font-family: 'Noto Sans Thai', 'Baloo 2', system-ui, sans-serif; background: #f4f1fb; color: #1f1a2e; }\n  ::-webkit-scrollbar { width: 8px; }\n  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 8px; }\n  @keyframes popIn { 0% { transform: scale(.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }\n  @keyframes floatUp { 0% { transform: translateY(8px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; display: flex; justify-content: center; background: radial-gradient(120% 80% at 50% 0%, #fdeef6 0%, #eef0fc 40%, #f4f1fb 100%);\">\n<div style=\"width: 100%; max-width: 600px; padding: 20px 18px 48px; position: relative;\">\n\n  <sc-if value=\"{{ isLoading }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: #8b83a3;\">\n      <div style=\"font-size: 44px;\">📚<\u002Fdiv>\n      <div style=\"font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 20px;\">กำลังโหลดการ์ด…<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ HOME ============ -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation: floatUp .4s ease both;\">\n      <div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 4px;\">\n        <div style=\"font-size: 34px;\">📚<\u002Fdiv>\n        <div>\n          <div style=\"font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 27px; line-height: 1.05; color: #2b2444;\">TOEIC Flash Cards<\u002Fdiv>\n          <div style=\"font-size: 13.5px; color: #7b7396; font-weight: 500;\">แตะการ์ดเพื่อพลิกดูคำแปล · เก็บคำยากด้วยดาว ⭐<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; gap: 10px; margin: 18px 0 20px;\">\n        <div style=\"flex: 1; background: #fff; border-radius: 18px; padding: 14px 16px; box-shadow: 0 6px 20px rgba(80,60,140,.07);\">\n          <div style=\"font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 26px; color: #6a4bd6;\">{{ totalCards }}<\u002Fdiv>\n          <div style=\"font-size: 12.5px; color: #8079a0; font-weight: 500;\">การ์ดทั้งหมด<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex: 1; background: #fff; border-radius: 18px; padding: 14px 16px; box-shadow: 0 6px 20px rgba(80,60,140,.07);\">\n          <div style=\"font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 26px; color: #23a06a;\">{{ seenTotal }}<\u002Fdiv>\n          <div style=\"font-size: 12.5px; color: #8079a0; font-weight: 500;\">เรียนแล้ว<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasStarred }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ enterStarred }}\" style=\"cursor: pointer; display: flex; align-items: center; gap: 14px; background: linear-gradient(100deg, #ffd76b, #ffab5e); border-radius: 20px; padding: 16px 18px; margin-bottom: 18px; box-shadow: 0 10px 24px rgba(240,160,60,.28);\">\n          <div style=\"font-size: 30px;\">⭐<\u002Fdiv>\n          <div style=\"flex: 1;\">\n            <div style=\"font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 17px; color: #6b3d00;\">คำที่บันทึกไว้<\u002Fdiv>\n            <div style=\"font-size: 12.5px; color: #8a5a12; font-weight: 500;\">ทบทวนคำยากที่คุณติดดาว<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 22px; color: #6b3d00;\">{{ starredCount }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display: flex; flex-direction: column; gap: 13px;\">\n        <sc-for list=\"{{ decks }}\" as=\"d\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ d.open }}\" style=\"cursor: pointer; background: #fff; border-radius: 22px; padding: 17px 18px; box-shadow: 0 8px 22px rgba(80,60,140,.08); position: relative; overflow: hidden;\">\n            <div style=\"display: flex; align-items: center; gap: 15px;\">\n              <div style=\"width: 54px; height: 54px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 27px; background: {{ d.accentSoft }};\">{{ d.emoji }}<\u002Fdiv>\n              <div style=\"flex: 1; min-width: 0;\">\n                <div style=\"font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 18px; color: #2b2444; line-height: 1.1;\">{{ d.name }}<\u002Fdiv>\n                <div style=\"font-size: 12.5px; color: #8079a0; font-weight: 500; margin-top: 2px;\">{{ d.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align: right; flex-shrink: 0;\">\n                <div style=\"font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 20px; color: {{ d.accent }};\">{{ d.count }}<\u002Fdiv>\n                <div style=\"font-size: 11px; color: #a49fb8; font-weight: 500;\">การ์ด<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top: 13px; display: flex; align-items: center; gap: 10px;\">\n              <div style=\"flex: 1; height: 7px; border-radius: 6px; background: {{ d.accentSoft }}; overflow: hidden;\">\n                <div style=\"height: 100%; border-radius: 6px; width: {{ d.barW }}; background: {{ d.accent }};\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size: 11.5px; color: #8079a0; font-weight: 600; white-space: nowrap;\">{{ d.seen }}/{{ d.count }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"text-align: center; margin-top: 26px; font-size: 12px; color: #a8a2bd; font-weight: 500;\">คำศัพท์-ไวยากรณ์ระดับเจอบ่อยในข้อสอบ TOEIC · เพิ่มชุดได้เรื่อย ๆ<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ STUDY ============ -->\n  <sc-if value=\"{{ isStudy }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation: floatUp .35s ease both;\">\n      <!-- top bar -->\n      <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 14px;\">\n        <div onclick=\"{{ goHome }}\" style=\"cursor: pointer; width: 42px; height: 42px; border-radius: 13px; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(80,60,140,.08); font-size: 20px; color: #4a4266;\">‹<\u002Fdiv>\n        <div style=\"flex: 1; text-align: center;\">\n          <div style=\"font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 16px; color: {{ accentDeep }};\">{{ headerTitle }}<\u002Fdiv>\n          <div style=\"font-size: 12px; color: #948db0; font-weight: 600;\">{{ posLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div onclick=\"{{ shuffle }}\" style=\"cursor: pointer; width: 42px; height: 42px; border-radius: 13px; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(80,60,140,.08); font-size: 17px; color: {{ accent }};\">🔀<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- progress -->\n      <div style=\"height: 7px; border-radius: 6px; background: {{ accentSoft }}; overflow: hidden; margin-bottom: 20px;\">\n        <div style=\"height: 100%; border-radius: 6px; width: {{ progW }}; background: {{ accent }}; transition: width .3s ease;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- flip card -->\n      <div onclick=\"{{ flip }}\" style=\"cursor: pointer; perspective: 1400px; height: 440px; max-height: 60vh;\">\n        <div style=\"position: relative; width: 100%; height: 100%; transition: transform .55s cubic-bezier(.4,.2,.2,1); transform-style: preserve-3d; transform: {{ cardTransform }};\">\n\n          <!-- FRONT -->\n          <div style=\"position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 28px; background: linear-gradient(160deg, {{ accent }}, {{ accentDeep }}); box-shadow: 0 18px 40px {{ accentShadow }}; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center;\">\n            <div style=\"position: absolute; top: 18px; left: 20px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,.8); letter-spacing: .04em;\">{{ deckBadge }}<\u002Fdiv>\n            <div style=\"position: absolute; top: 16px; right: 18px; font-size: 20px; opacity: {{ starOpacity }};\">⭐<\u002Fdiv>\n            <div style=\"font-family: 'Baloo 2', sans-serif; font-weight: 700; color: #fff; line-height: 1.15; font-size: {{ frontSize }}; text-wrap: balance;\">{{ word }}<\u002Fdiv>\n            <sc-if value=\"{{ hasPhon }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top: 10px; font-size: 16px; color: rgba(255,255,255,.85); font-family: 'Baloo 2', sans-serif;\">{{ phon }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ hasPos }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top: 14px; padding: 5px 14px; border-radius: 999px; background: rgba(255,255,255,.22); color: #fff; font-size: 13px; font-weight: 600;\">{{ posTag }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"position: absolute; bottom: 18px; left: 0; right: 0; text-align: center; font-size: 12.5px; color: rgba(255,255,255,.7); font-weight: 500;\">แตะเพื่อดูคำแปล 👆<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- BACK -->\n          <div style=\"position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; transform: rotateY(180deg); border-radius: 28px; background: #fff; box-shadow: 0 18px 40px rgba(80,60,140,.16); padding: 24px 22px; overflow-y: auto; border: 2px solid {{ accentSoft }};\">\n            <div style=\"font-size: 12.5px; font-weight: 600; color: {{ accent }}; margin-bottom: 4px;\">{{ word }}<\u002Fdiv>\n            <div style=\"font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 24px; color: #2b2444; line-height: 1.25; margin-bottom: 16px;\">{{ thaiMeaning }}<\u002Fdiv>\n\n            <sc-if value=\"{{ hasEx }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background: {{ accentSoft }}; border-radius: 14px; padding: 13px 15px; margin-bottom: 12px;\">\n                <div style=\"font-size: 14.5px; color: #3a3357; font-weight: 500; font-style: italic; line-height: 1.4;\">\"{{ ex }}\"<\u002Fdiv>\n                <sc-if value=\"{{ hasExTh }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size: 13px; color: #7a7397; margin-top: 6px; line-height: 1.4;\">{{ exTh }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ hasNote }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display: flex; gap: 9px; background: #fff7e6; border-radius: 14px; padding: 12px 14px; margin-bottom: 12px;\">\n                <div style=\"font-size: 15px;\">💡<\u002Fdiv>\n                <div style=\"font-size: 13px; color: #7a5a1a; line-height: 1.45;\">{{ note }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n              <sc-if value=\"{{ hasSyn }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display: flex; align-items: center; gap: 7px; background: #eafbf1; border-radius: 12px; padding: 8px 12px;\">\n                  <span style=\"font-size: 12px; font-weight: 600; color: #1f9c62;\">คำพ้อง<\u002Fspan>\n                  <span style=\"font-size: 13px; color: #2b6a4a;\">{{ synText }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ hasAnt }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display: flex; align-items: center; gap: 7px; background: #fdecec; border-radius: 12px; padding: 8px 12px;\">\n                  <span style=\"font-size: 12px; font-weight: 600; color: #d0524a;\">ตรงข้าม<\u002Fspan>\n                  <span style=\"font-size: 13px; color: #a03e38;\">{{ antText }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- controls -->\n      <div style=\"display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 24px;\">\n        <div onclick=\"{{ prev }}\" style=\"cursor: pointer; width: 56px; height: 56px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(80,60,140,.1); font-size: 24px; color: #4a4266; opacity: {{ prevOpacity }};\">‹<\u002Fdiv>\n        <div onclick=\"{{ toggleStar }}\" style=\"cursor: pointer; width: 68px; height: 68px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 8px 20px {{ starBtnShadow }}; background: {{ starBtnBg }};\">{{ starIcon }}<\u002Fdiv>\n        <div onclick=\"{{ next }}\" style=\"cursor: pointer; width: 56px; height: 56px; border-radius: 50%; background: {{ accent }}; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 18px {{ accentShadow }}; font-size: 24px; color: #fff;\">›<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align: center; margin-top: 12px; font-size: 12.5px; color: #948db0; font-weight: 500;\">{{ starHint }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:600,&quot;height&quot;:900},&quot;showPhonetic&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;การ์ด&quot;},&quot;shuffleOnStart&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;การ์ด&quot;}}\">\nclass Component extends DCLogic {\n  state = { decks: null, view: 'home', deckId: null, order: [], pos: 0, flipped: false, starred: {}, seen: {} };\n\n  componentDidMount() {\n    try {\n      const s = JSON.parse(localStorage.getItem('toeic_fc_v1') || '{}');\n      if (s.starred || s.seen) this.setState({ starred: s.starred || {}, seen: s.seen || {} });\n    } catch (e) {}\n    const load = (n) => {\n      if (window.DECKS) { this.setState({ decks: window.DECKS }); return; }\n      if (n > 0) setTimeout(() => load(n - 1), 100);\n    };\n    load(30);\n  }\n\n  persist() {\n    try { localStorage.setItem('toeic_fc_v1', JSON.stringify({ starred: this.state.starred, seen: this.state.seen })); } catch (e) {}\n  }\n\n  allCards() {\n    const arr = [];\n    (this.state.decks || []).forEach(d => d.cards.forEach(c => arr.push(Object.assign({ deckId: d.id }, c))));\n    return arr;\n  }\n  cardMap() { const m = {}; this.allCards().forEach(c => { m[c.id] = c; }); return m; }\n\n  shuffleArr(a) {\n    a = a.slice();\n    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = a[i]; a[i] = a[j]; a[j] = t; }\n    return a;\n  }\n\n  enterDeck(deckId) {\n    const deck = this.state.decks.find(d => d.id === deckId);\n    let ids = deck.cards.map(c => c.id);\n    if (this.props.shuffleOnStart) ids = this.shuffleArr(ids);\n    this.setState({ view: 'study', deckId, order: ids, pos: 0, flipped: false });\n  }\n\n  enterStarred() {\n    const ids = this.allCards().filter(c => this.state.starred[c.id]).map(c => c.id);\n    if (!ids.length) return;\n    this.setState({ view: 'study', deckId: '__starred__', order: ids, pos: 0, flipped: false });\n  }\n\n  goHome() { this.setState({ view: 'home', flipped: false }); }\n\n  flip() {\n    const id = this.state.order[this.state.pos];\n    this.setState(s => ({ flipped: !s.flipped, seen: Object.assign({}, s.seen, { [id]: true }) }), () => this.persist());\n  }\n\n  next() {\n    this.setState(s => ({ pos: Math.min(s.pos + 1, s.order.length - 1), flipped: false }));\n  }\n  prev() {\n    this.setState(s => ({ pos: Math.max(s.pos - 1, 0), flipped: false }));\n  }\n  shuffle() {\n    this.setState(s => ({ order: this.shuffleArr(s.order), pos: 0, flipped: false }));\n  }\n  toggleStar() {\n    const id = this.state.order[this.state.pos];\n    this.setState(s => {\n      const st = Object.assign({}, s.starred);\n      if (st[id]) delete st[id]; else st[id] = true;\n      return { starred: st };\n    }, () => this.persist());\n  }\n\n  renderVals() {\n    const s = this.state;\n    if (!s.decks) return { isLoading: true, isHome: false, isStudy: false };\n\n    const seenTotal = this.allCards().filter(c => s.seen[c.id]).length;\n    const totalCards = this.allCards().length;\n    const starredKeys = Object.keys(s.starred).filter(k => s.starred[k]);\n\n    const decks = s.decks.map(d => {\n      const seen = d.cards.filter(c => s.seen[c.id]).length;\n      const pct = Math.round(seen / d.cards.length * 100);\n      return Object.assign({}, d, {\n        count: d.cards.length,\n        seen,\n        barW: pct + '%',\n        accent: `oklch(0.64 0.19 ${d.hue})`,\n        accentDeep: `oklch(0.50 0.16 ${d.hue})`,\n        accentSoft: `oklch(0.96 0.045 ${d.hue})`,\n        open: () => this.enterDeck(d.id)\n      });\n    });\n\n    const base = {\n      isLoading: false,\n      isHome: s.view === 'home',\n      isStudy: s.view === 'study',\n      decks,\n      totalCards,\n      seenTotal,\n      hasStarred: starredKeys.length > 0,\n      starredCount: starredKeys.length,\n      enterStarred: () => this.enterStarred(),\n      goHome: () => this.goHome(),\n      flip: () => this.flip(),\n      next: () => this.next(),\n      prev: () => this.prev(),\n      shuffle: () => this.shuffle(),\n      toggleStar: () => this.toggleStar()\n    };\n\n    if (s.view !== 'study') return base;\n\n    const map = this.cardMap();\n    const card = map[s.order[s.pos]] || {};\n    const deck = s.decks.find(d => d.id === card.deckId) || s.decks[0];\n    const hue = deck.hue;\n    const showPhon = this.props.showPhonetic !== false;\n\n    const w = (card.front || '');\n    const frontSize = w.length < 13 ? '52px' : (w.length < 24 ? '36px' : (w.length < 40 ? '28px' : '23px'));\n    const isStarred = !!s.starred[card.id];\n\n    return Object.assign(base, {\n      headerTitle: s.deckId === '__starred__' ? 'คำที่บันทึกไว้ ⭐' : deck.name,\n      deckBadge: deck.en,\n      posLabel: (s.pos + 1) + ' / ' + s.order.length,\n      progW: Math.round((s.pos + 1) / Math.max(s.order.length, 1) * 100) + '%',\n      accent: `oklch(0.64 0.19 ${hue})`,\n      accentDeep: `oklch(0.48 0.16 ${hue})`,\n      accentSoft: `oklch(0.96 0.045 ${hue})`,\n      accentShadow: `oklch(0.64 0.19 ${hue} / 0.4)`,\n      cardTransform: s.flipped ? 'rotateY(180deg)' : 'rotateY(0deg)',\n      word: card.front || '',\n      frontSize,\n      hasPhon: !!card.phon && showPhon,\n      phon: card.phon || '',\n      hasPos: !!card.pos,\n      posTag: card.pos || '',\n      thaiMeaning: card.thai || '',\n      hasEx: !!card.ex,\n      ex: card.ex || '',\n      hasExTh: !!card.exTh,\n      exTh: card.exTh || '',\n      hasNote: !!card.note,\n      note: card.note || '',\n      hasSyn: !!(card.syn && card.syn.length),\n      synText: (card.syn || []).join(', '),\n      hasAnt: !!(card.ant && card.ant.length),\n      antText: (card.ant || []).join(', '),\n      starOpacity: isStarred ? 1 : 0,\n      starIcon: isStarred ? '⭐' : '☆',\n      starBtnBg: isStarred ? 'linear-gradient(100deg,#ffd76b,#ffab5e)' : '#fff',\n      starBtnShadow: isStarred ? 'rgba(240,160,60,.4)' : 'rgba(80,60,140,.12)',\n      starHint: isStarred ? 'บันทึกคำนี้เป็นคำยากแล้ว' : 'แตะดาวเพื่อบันทึกเป็นคำยาก',\n      prevOpacity: s.pos === 0 ? 0.4 : 1\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

</html>
